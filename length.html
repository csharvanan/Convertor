<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heat Convertor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="header">
    <ul class="menulist"><a href="index.html">Heat Convertor</a></ul>
    <ul class="menulist"><a href="length.html">Length Convertor</a></ul>
    </nav>
    <div class="container">
    <h1 class="heading">Length Convertor <span class="subhead">(Meter to Kilometer)</span></h1>

        <input type="text" id="meter" name="meter" placeholder="Enter the value in Meter">
        <div id="error"></div>
        <button class="convert-btn" onclick="metertoall()">Convert to Millimeter</button>
        <button class="reset-btn" onclick="resetVal()">Reset</button>
        <div id="result"></div>

    </div>
    <script>
        function metertoall() {
            const meterInput = document.getElementById('meter');
            const meterValue = parseFloat(meterInput.value);
            
            if (isNaN(meterValue)) {
                const errorDiv = document.getElementById('error');
                errorDiv.innerHTML = 'Please enter a valid number for Meter.';
                errorDiv.style.color = 'red';
                return;
            }
            else{
                const errorDiv = document.getElementById('error');
                errorDiv.innerHTML = '';
            }
            
            const kilometer = meterValue/1000;
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `${meterValue} m is equal to ${kilometer.toFixed(2)} km.`;
        }
        function resetVal() { 
            window.location.reload();
        }
    </script>
</body>
</html>
